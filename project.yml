name: Coherence

fileGroups:
  - CLAUDE.md
  - README.md
  - project.yml
  - App_ROADMAP_v2.md

options:
  bundleIdPrefix: com.lockout
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""          # Set in Xcode (Signing & Capabilities)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Coherence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Coherence
      - Shared
      - path: PURPOSE.md
        buildPhase: resources
      - path: SCIENCE.md
        buildPhase: resources
    dependencies:
      - target: CoherenceWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lockout.coherence
        INFOPLIST_FILE: Coherence/Info.plist
        CODE_SIGN_ENTITLEMENTS: Coherence/Coherence.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.10"

  CoherenceWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - CoherenceWatch
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lockout.coherence.watchkitapp
        WKCompanionAppBundleIdentifier: com.lockout.coherence
        INFOPLIST_FILE: CoherenceWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: CoherenceWatch/CoherenceWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO

  CoherenceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - CoherenceTests
      - Shared
    dependencies:
      - target: Coherence
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lockout.coherence.tests

schemes:
  Coherence:
    build:
      targets:
        Coherence: all
        CoherenceTests: [test]
    test:
      targets:
        - CoherenceTests
    run:
      config: Debug
  CoherenceWatch:
    build:
      targets:
        CoherenceWatch: all
    run:
      config: Debug
